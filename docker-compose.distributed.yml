services:
  coordinator:
    build:
      context: .
      dockerfile: Dockerfile.distributed
      args:
        TARGET: cmd/coordinator-service
    container_name: coordinator
    ports:
      - "50051:50051"
    environment:
      COORD_ADDR: ":50051"
      NUM_ROUNDS: "5"
      EPOCHS: "1"
      LEARNING_RATE: "0.01"
      ROOMS: "kitchen,livingroom,bedroom,bathroom,garage"
      SAMPLES_PER_SENSOR: "800"
      VAL_SAMPLES: "100"
      MIN_SENSORS: "5"

  sensor-kitchen:
    build:
      context: .
      dockerfile: Dockerfile.distributed
      args:
        TARGET: cmd/sensor-service
    container_name: sensor-kitchen
    ports:
      - "5051:5051"
    environment:
      COORD_ADDR: "coordinator:50051"
      SENSOR_ADDR: ":5051"
      SENSOR_ID: "sensor-kitchen"
      ROOM_ID: "kitchen"
      SAMPLES: "800"
      NON_IID: "true"
      EPOCHS: "1"
      LEARNING_RATE: "0.01"
      MY_ADDR: "sensor-kitchen:5051"
    depends_on:
      coordinator:
        condition: service_started

  sensor-livingroom:
